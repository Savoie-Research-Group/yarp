initialize:
  enumerate: True
  initial species: c1c2ccccc2ccc1
  output: napthalene.pkl
  mode: concerted
  bonds to break: 2
  bonds to form: 2
  enumeration filters:
    lewis score: 0.0
    formal charge: 5.0
    discard strained rings: False
    
stages:
  - egat

egat:
  method: ml_predict
  model: egat_pretrain
