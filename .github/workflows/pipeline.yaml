name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: 🛎️ Check out the repository
        uses: actions/checkout@v4

      - name: 🧪 Set up Miniconda
        uses: conda-incubator/setup-miniconda@v2
        with:
          auto-update-conda: true
          python-version: 3.13.2
          environment-file: environment.yml
          activate-environment: yarp-again

      - name: 📦 Install your local package
        shell: bash -l {0}
        run: |
          pip install -e .

      - name: ✅ Run pytest
        shell: bash -l {0}
        run: |
          pytest test/ -v

