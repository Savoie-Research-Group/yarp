initialize:
  verbose: true
  output: rxns.pkl
  status: STATUS.json
  initial_structure:
    source: [C:1]([C:2](=[O:3])[O:4][H:5])([H:6])([H:7])[H:8].[N:9]([H:10])([H:11])[H:12]
    type: smiles
    mode: species
  enumeration:
    mode: concerted
    n_break: 2
    n_form: 2

  job_manager:
    scheduler: local
    container: docker
    max_active_jobs: 100

stages:
  - egat

egat:
  method: ml_rxn_prop
  model: egat_rgd1
  n_cpus: 8
  mem_per_cpu: 1000 # in MB
