input:
  # Path to a text file containing one SMILES string.
  # Relative paths are resolved relative to this config file.
  smiles_txt: "./smiles.txt"

output:
  # Directory for generated YAMLs, pickles, logs, and optional CSV output.
  work_dir: "./output"
  # Optional fixed run tag. Set to null to use current timestamp.
  run_tag: null
  # Max characters from sanitized SMILES used in output filename prefix.
  network_max_length: 24

logging:
  verbose: false

network:
  # Each ERS entry is paired with the matching depth entry by index.
  ers: ["b2f2", "b3f3"]
  depth: [2, 1]

yarp:
  # Path to yarp-again's main_yarp.py.
  main_yarp_path: "/users/tburton2/Repos/yarp-again/yarp/main_yarp.py"
  enumerate: true
  mode: "concerted"
  separate_products: null
  lewis_score: 0
  formal_charge: 2.0
  discard_strained_rings: false
  barrier_cutoff: 120
  barrier_source: "egat"
  stage: "egat"
  egat_method: "ml_predict"
  egat_model: "egat_pretrain"
  strip_stereo: true

export:
  # Toggle CSV export via yarp-again helper script.
  enable_csv: true
  # Required if enable_csv=true.
  export_script_path: "/users/tburton2/Repos/yarp-again/helper/export_rxn_smi.py"
  canon: true
  egat: true
  flux: false
