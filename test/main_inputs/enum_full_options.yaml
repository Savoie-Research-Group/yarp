initialize:
  verbose: True
  output: tmp.pkl
  status: STATUS.json
  initial_structure:
    source: '[O:0]=[C:1]([C:2]([O:3][H:7])([H:5])[H:6])[H:4]'
    type: smiles
    mode: species
  job_manager:
     scheduler: local
     container: docker
     max_active_jobs: 100
  enumeration:
    mode: concerted
    n_break: 2
    n_form: 2
    react_atoms: [0, 1, 2, 3]
    pre_enum_filters:
      separate_prods: True
    post_enum_filters:
      lewis_score: 0.0
      formal_charge: 2.0
      ring_filter: False
