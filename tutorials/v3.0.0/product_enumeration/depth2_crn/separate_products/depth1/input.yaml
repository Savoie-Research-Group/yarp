initialize:
  verbose: True
  output: HAA_depth1.pkl
  status: STATUS.json
  initial_structure:
    source: O=CCO
    type: smiles
    mode: species
  job_manager:
     scheduler: sge
     queue: long
     container: apptainer
     max_active_jobs: 100
  enumeration:
    mode: concerted
    n_break: 2
    n_form: 2
    post_enum_filters:
      lewis_score: 0.0
      formal_charge: 2.0
      ring_filter: False