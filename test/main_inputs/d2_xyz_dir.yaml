initialize:
  verbose: True
  output: tmp.pkl
  status: STATUS.json
  initial_structure:
    source: ../molecules/d1_3hp_b2f2_heavy/rxn_xyzs
    type: xyz
    mode: reaction
  job_manager:
     scheduler: local
     container: docker
     max_active_jobs: 4
  enumeration:
    mode: concerted
    n_break: 2
    n_form: 2
    react_atoms: [0, 1, 2, 3, 4]
    pre_enum_filters:
      separate_prods: True
    post_enum_filters:
      lewis_score: 0.0
      formal_charge: 2.0
      ring_filter: False