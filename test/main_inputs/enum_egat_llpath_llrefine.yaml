initialize:
  initial species: OCC=O # can also be a path to an XYZ or MOL file
  output: tmp.pkl
  enumeration:
    enumerate: True
    mode: concerted
    bonds to break: 2
    bonds to form: 2
    enumeration filters:
      lewis score: 0.0
      formal charge: 2.0
      discard strained rings: False

stages:
 - egat
 - ll_path
 - ll_refine

egat:
  method: ml_predict
  model: egat_pretrain

ll_path:
  method: init_rxn_path
  conformers:
     n_conf: 3
     software: crest
     lot: gfn
     n_cpus: 4
     selector: rich # other option: poor
     joint_opt: dual # other options: r_only, p_only
  gsm:
     software: pysisyphus
     lot: xtb
     n_cpus: 4

ll_refine:
  method: refine_rxn_path
  rp_opt:
     software: pysisyphus
     lot: xtb
     n_cpus: 4
  ts_opt:
     software: pysisyphus
     lot: xtb
     n_cpus: 4
  irc_val:
     software: pysisyphus
     lot: xtb
     n_cpus: 4