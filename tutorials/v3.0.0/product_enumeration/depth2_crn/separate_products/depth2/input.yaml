initialize:
  verbose: True
  output: HAA_depth2.pkl
  status: STATUS.json
  initial_structure:
    source: ../depth1/HAA_depth1.pkl
    type: yarp_pickle
    mode: reaction
  job_manager:
     scheduler: sge
     queue: long
     container: apptainer
     max_active_jobs: 100
  enumeration:
    mode: concerted
    n_break: 2
    n_form: 2
    pre_enum_filters:
      separate_prods: True
    post_enum_filters:
      lewis_score: 0.0
      formal_charge: 2.0
      ring_filter: False