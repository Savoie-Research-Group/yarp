initialize:
  initial species: OCC=O # can also be a path to an XYZ or MOL file
  output: tmp.pkl
  enumeration:
    enumerate: True
    mode: concerted
    bonds to break: 2
    bonds to form: 2
    reactive atoms: [0, 1, 2, 3] # only enumerate between heavy atoms
    enumeration filters:
      lewis score: 0.0
      formal charge: 2.0
      discard strained rings: False

stages:
 - egat
 - ll_path
 - ll_refine

egat:
  method: ml_rxn_prop
  model: egat_rgd1
  n_cpus: 1
  mem_per_cpu: 1000 # in MB

ll_path:
  method: init_rxn_path
  conformers:
     n_conf: 3
     software: crest
     lot: gfn
     n_cpus: 4
     joint_opt: dual # other options: r_only, p_only
  gsm:
     software: pysisyphus
     lot: xtb
     n_cpus: 4

ll_refine:
  method: refine_rxn_path
  initial_geom:
    reactant:
      label: conf_gen
      lot: gfn
      software: crest
    product:
      label: conf_gen
      lot: gfn
      software: crest
    transition_state:
      label: ts_guess
      lot: xtb
      software: pysisyphus  
  rp_opt:
     software: pysisyphus
     lot: xtb
     n_cpus: 4
  ts_opt:
     software: pysisyphus
     lot: xtb
     n_cpus: 4
  irc_val:
     software: pysisyphus
     lot: xtb
     n_cpus: 4