initialize:
  enumerate: True
  initial species: OCC=O # can also be a path to an XYZ or MOL file
  output: tmp.pkl
  mode: concerted
  bonds to break: 2
  bonds to form: 2
  reactive atoms: [0, 1, 2, 3] # only enumerate between heavy atoms
  enumeration filters:
    lewis score: 0.0
    formal charge: 2.0
    discard strained rings: False

stages:
 - egat
 - ll_refine

egat:
  method: ml_predict
  model: egat_pretrain

ll_refine:
  method: refine_rxn_path
  rp_opt:
     software: pysisyphus
     lot: xtb
     n_cpus: 4
  ts_opt:
     software: pysisyphus
     lot: xtb
     n_cpus: 4
  irc_val:
     software: pysisyphus
     lot: xtb
     n_cpus: 4